<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Private Messenger</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth, onAuthStateChanged, signInWithEmailAndPassword,
      createUserWithEmailAndPassword, signOut, updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, collection, doc, setDoc, getDoc, getDocs,
      addDoc, query, orderBy, onSnapshot, serverTimestamp,
      where, or
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ─── 🔧 ЗАМЕНИ НА СВОИ ДАННЫЕ FIREBASE ───────────────────────────────────
    const firebaseConfig = {
      apiKey:            "YOUR_API_KEY",
      authDomain:        "YOUR_PROJECT.firebaseapp.com",
      projectId:         "YOUR_PROJECT_ID",
      storageBucket:     "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId:             "YOUR_APP_ID"
    };
    // ──────────────────────────────────────────────────────────────────────────

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    /* ── helpers ── */
    const $ = id => document.getElementById(id);

    /* ── state ── */
    let currentUser   = null;
    let allUsers      = [];
    let selectedUid   = null;
    let unsubMessages = null;

    /* ═══════════════════════════════════════
       AUTH
    ═══════════════════════════════════════ */
    onAuthStateChanged(auth, async user => {
      if (user) {
        currentUser = user;
        await loadUsers();
        showApp();
        $("username-display").textContent = user.displayName || user.email;
      } else {
        showAuth();
      }
    });

    window.doLogin = async () => {
      const email    = $("auth-email").value.trim();
      const password = $("auth-password").value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) { showError(e.message); }
    };

    window.doRegister = async () => {
      const email    = $("auth-email").value.trim();
      const password = $("auth-password").value;
      const name     = $("auth-name").value.trim();
      if (!name) return showError("Введите имя");
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: name });
        await setDoc(doc(db, "users", cred.user.uid), {
          uid:         cred.user.uid,
          displayName: name,
          email:       email,
          createdAt:   serverTimestamp()
        });
      } catch (e) { showError(e.message); }
    };

    window.doLogout = async () => {
      if (unsubMessages) unsubMessages();
      await signOut(auth);
    };

    /* ═══════════════════════════════════════
       USERS
    ═══════════════════════════════════════ */
    async function loadUsers() {
      const snap = await getDocs(collection(db, "users"));
      allUsers = [];
      snap.forEach(d => {
        if (d.id !== currentUser.uid) allUsers.push(d.data());
      });
      renderUsers(allUsers);
    }

    function renderUsers(list) {
      const container = $("users-list");
      container.innerHTML = "";
      list.forEach(u => {
        const div = document.createElement("div");
        div.className = "user-item" + (u.uid === selectedUid ? " active" : "");
        div.innerHTML = `
          <div class="avatar">${getInitial(u.displayName)}</div>
          <span class="user-name">${u.displayName}</span>
        `;
        div.onclick = () => selectUser(u);
        container.appendChild(div);
      });
    }

    /* ═══════════════════════════════════════
       CONVERSATION
    ═══════════════════════════════════════ */
    function getChatId(uid1, uid2) {
      return [uid1, uid2].sort().join("_");
    }

    function selectUser(u) {
      selectedUid = u.uid;
      renderUsers(allUsers);
      $("chat-title").textContent = u.displayName;
      $("chat-placeholder").style.display = "none";
      $("chat-area").style.display        = "flex";

      if (unsubMessages) unsubMessages();
      subscribeMessages(getChatId(currentUser.uid, u.uid));
    }

    function subscribeMessages(chatId) {
      const q = query(
        collection(db, "chats", chatId, "messages"),
        orderBy("createdAt", "asc")
      );
      unsubMessages = onSnapshot(q, snap => {
        const box = $("messages-box");
        box.innerHTML = "";
        snap.forEach(d => {
          const m   = d.data();
          const div = document.createElement("div");
          div.className = "message " + (m.senderId === currentUser.uid ? "sent" : "received");
          div.innerHTML = `
            <div class="bubble">${escapeHtml(m.text)}</div>
            <div class="msg-time">${formatTime(m.createdAt)}</div>
          `;
          box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
      });
    }

    window.sendMessage = async () => {
      const input = $("msg-input");
      const text  = input.value.trim();
      if (!text || !selectedUid) return;
      input.value = "";
      const chatId = getChatId(currentUser.uid, selectedUid);
      await setDoc(doc(db, "chats", chatId), { participants: [currentUser.uid, selectedUid] });
      await addDoc(collection(db, "chats", chatId, "messages"), {
        text,
        senderId:  currentUser.uid,
        createdAt: serverTimestamp()
      });
    };

    $("msg-input") && $("msg-input").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); window.sendMessage(); }
    });

    /* ── search ── */
    $("search-input") && $("search-input").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      renderUsers(allUsers.filter(u => u.displayName.toLowerCase().includes(q)));
    });

    /* ═══════════════════════════════════════
       UI helpers
    ═══════════════════════════════════════ */
    function showApp()  { $("auth-screen").style.display = "none";  $("app-screen").style.display = "flex"; }
    function showAuth() { $("auth-screen").style.display = "flex";  $("app-screen").style.display = "none"; }
    function showError(msg) { $("auth-error").textContent = msg; }
    function getInitial(name) { return (name || "?")[0].toUpperCase(); }
    function escapeHtml(t) {
      return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
    function formatTime(ts) {
      if (!ts) return "";
      const d = ts.toDate ? ts.toDate() : new Date();
      return d.toLocaleTimeString("ru", { hour:"2-digit", minute:"2-digit" });
    }

    /* ── tab toggle ── */
    window.showTab = tab => {
      $("tab-login").classList.toggle("active", tab === "login");
      $("tab-reg").classList.toggle("active",   tab === "reg");
      $("login-form").style.display = tab === "login" ? "flex" : "none";
      $("reg-form").style.display   = tab === "reg"   ? "flex" : "none";
      $("auth-error").textContent   = "";
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f13;
      --surface:  #17171d;
      --card:     #1e1e27;
      --border:   #2a2a38;
      --accent:   #6c63ff;
      --accent2:  #a78bfa;
      --text:     #e8e8f0;
      --muted:    #7070a0;
      --sent-bg:  #6c63ff;
      --recv-bg:  #2a2a38;
      --radius:   14px;
    }

    body {
      font-family: "Sora", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── AUTH ── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 60% 20%, #1a1230 0%, var(--bg) 65%);
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 360px;
      box-shadow: 0 24px 80px rgba(108,99,255,.18);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo .icon {
      font-size: 40px;
      display: block;
      margin-bottom: 8px;
    }
    .auth-logo h1 {
      font-size: 22px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .auth-logo p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: "Sora", sans-serif;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 18px;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: "Sora", sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #8b7cf8);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: "Sora", sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn-primary:hover  { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }

    #auth-error {
      color: #f87171;
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }

    /* ── APP ── */
    #app-screen {
      display: none;
      width: 100%; height: 100%;
      flex-direction: column;
    }

    /* topbar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar-brand {
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #username-display {
      font-size: 13px;
      color: var(--muted);
    }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: "Sora", sans-serif;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover { border-color: #f87171; color: #f87171; }

    /* main layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* sidebar */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    #search-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: "Sora", sans-serif;
      font-size: 13px;
      outline: none;
    }
    #search-input:focus { border-color: var(--accent); }

    #users-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    #users-list::-webkit-scrollbar { width: 4px; }
    #users-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s;
    }
    .user-item:hover  { background: var(--card); }
    .user-item.active { background: rgba(108,99,255,.18); }
    .user-item.active .user-name { color: var(--accent2); }

    .avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), #8b7cf8);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 600;
      flex-shrink: 0;
    }
    .user-name { font-size: 14px; font-weight: 500; }

    /* chat panel */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    #chat-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 12px;
    }
    #chat-placeholder .ph-icon { font-size: 52px; }
    #chat-placeholder p { font-size: 14px; }

    #chat-area {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    #chat-title {
      font-size: 16px;
      font-weight: 600;
    }

    #messages-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #messages-box::-webkit-scrollbar { width: 4px; }
    #messages-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 60%;
    }
    .message.sent   { align-self: flex-end; align-items: flex-end; }
    .message.received { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .sent .bubble {
      background: var(--sent-bg);
      border-bottom-right-radius: 4px;
    }
    .received .bubble {
      background: var(--recv-bg);
      border-bottom-left-radius: 4px;
    }
    .msg-time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      padding: 0 4px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: "Sora", sans-serif;
      font-size: 14px;
      outline: none;
      resize: none;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    .btn-send {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--accent), #8b7cf8);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity .2s, transform .1s;
    }
    .btn-send:hover  { opacity: .85; }
    .btn-send:active { transform: scale(.95); }

    @media (max-width: 600px) {
      .sidebar { width: 72px; }
      .sidebar-header h2,
      .user-name,
      #search-input { display: none; }
      .sidebar-header { padding: 10px; }
      .user-item { justify-content: center; padding: 10px 0; }
    }
  </style>
</head>
<body>

<!-- ═══ AUTH SCREEN ═══ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="icon">💬</span>
      <h1>Private Messenger</h1>
      <p>Безопасные личные сообщения</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Войти</button>
      <button class="tab-btn"        id="tab-reg"   onclick="showTab('reg')">Регистрация</button>
    </div>

    <!-- LOGIN -->
    <div id="login-form" style="display:flex; flex-direction:column;">
      <div class="form-group">
        <input id="auth-email"    type="email"    placeholder="Email"/>
        <input id="auth-password" type="password" placeholder="Пароль"/>
      </div>
      <button class="btn-primary" onclick="doLogin()">Войти</button>
    </div>

    <!-- REGISTER -->
    <div id="reg-form" style="display:none; flex-direction:column;">
      <div class="form-group">
        <input id="auth-name"     type="text"     placeholder="Ваше имя"/>
        <input id="auth-email"    type="email"    placeholder="Email"/>
        <input id="auth-password" type="password" placeholder="Пароль (мин. 6 символов)"/>
      </div>
      <button class="btn-primary" onclick="doRegister()">Создать аккаунт</button>
    </div>

    <div id="auth-error"></div>
  </div>
</div>

<!-- ═══ APP SCREEN ═══ -->
<div id="app-screen">

  <!-- topbar -->
  <div class="topbar">
    <span class="topbar-brand">💬 Private Messenger</span>
    <div class="topbar-right">
      <span id="username-display"></span>
      <button class="btn-logout" onclick="doLogout()">Выйти</button>
    </div>
  </div>

  <div class="main">

    <!-- sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Контакты</h2>
        <input id="search-input" type="text" placeholder="🔍 Поиск..."/>
      </div>
      <div id="users-list"></div>
    </div>

    <!-- chat -->
    <div class="chat-panel">

      <div id="chat-placeholder">
        <div class="ph-icon">👈</div>
        <p>Выберите собеседника слева</p>
      </div>

      <div id="chat-area">
        <div class="chat-header">
          <div id="chat-title"></div>
        </div>
        <div id="messages-box"></div>
        <div class="input-row">
          <input id="msg-input" type="text" placeholder="Напишите сообщение..."/>
          <button class="btn-send" onclick="sendMessage()">➤</button>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
