<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS — Доп. функции</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h2 { color: #333; margin-bottom: 12px; font-size: 16px; }

        .container {
            width: 100%; max-width: 500px; background: white;
            padding: 25px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        input {
            width: 100%; padding: 12px; margin: 8px 0;
            border: 1px solid #ddd; border-radius: 6px;
            box-sizing: border-box; font-family: 'Inter', sans-serif;
        }

        .online-badge {
            display: flex; align-items: center; gap: 10px;
            background: #f0fdf4; border: 1px solid #bbf7d0;
            border-radius: 8px; padding: 14px 18px;
            font-size: 15px; font-weight: 600; color: #15803d;
        }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 0 0 rgba(34,197,94,0.4);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
            70%  { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
            100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
        }

        /* ───── ПОИСК ───── */
        .post {
            background: #fff; border: 1px solid #eaeaea;
            padding: 15px; margin-top: 12px;
            border-radius: 8px; width: 100%; max-width: 500px;
            position: relative;
        }
        .time { font-size: 11px; color: #999; float: right; }
        .like-btn {
            cursor: pointer; border: none; background: #f8f9fa;
            padding: 5px 12px; border-radius: 20px;
            font-size: 14px; transition: 0.2s;
        }
        .like-btn:hover { background: #e2e6ea; }
        .no-results { color: #999; font-size: 14px; margin-top: 12px; text-align: center; }

        /* Подсветка найденного текста */
        mark { background: #fff3cd; border-radius: 3px; padding: 0 2px; }
    </style>
</head>
<body>
    <a href="index.html" style="display:block;width:100%;max-width:500px;margin:0 auto 16px auto;padding:10px;background:#f0f7ff;border:1px solid #cce0ff;border-radius:8px;text-align:center;color:#007bff;font-family:'Inter',sans-serif;font-size:14px;text-decoration:none;">← Панель управления данными</a>
    <div class="container">
        <h2>👥 Онлайн прямо сейчас</h2>
        <div class="online-badge">
            <div class="dot"></div>
            <span id="onlineCount">Подключение...</span>
        </div>
        <p style="font-size:12px; color:#999; margin-top:10px;">
            Открой эту страницу в другой вкладке — счётчик обновится автоматически
        </p>
    </div>
    <div class="container">
        <h2>🔍 Поиск по базе данных</h2>
        <input type="text" id="searchInput" placeholder="Введите имя профиля...">
        <p id="searchHint" style="font-size:12px; color:#999; margin-top:4px;">
            Поиск происходит по данным из Firebase в реальном времени
        </p>
    </div>

    <div id="searchResults" style="width:100%; max-width:500px;"></div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, onValue, onDisconnect, set, remove, serverTimestamp as rtServerTimestamp }
                                   from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, updateDoc, doc, increment }
                                   from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyA8Rg1vOalzfafVpC2E9xqRi5TnzxHhLvU",
          authDomain: "test-852ff.firebaseapp.com",
          projectId: "test-852ff",
          storageBucket: "test-852ff.firebasestorage.app",
          messagingSenderId: "457915617515",
          appId: "1:457915617515:web:49d4eca0afc81d6b1daeae",
          measurementId: "G-11B2ZRR1N7"
          databaseURL: "https://test-852ff-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig, "functions");
        const db  = getFirestore(app);
        const rtdb = getDatabase(app);

       
        const sessionId = Math.random().toString(36).slice(2); // уникальный ID вкладки
        const myRef = ref(rtdb, `online/${sessionId}`);

        // Записываем себя как "онлайн"
        set(myRef, { connectedAt: Date.now() });

        // Когда вкладка закрывается — Firebase сам удалит запись
        onDisconnect(myRef).remove();

        // Слушаем узел /online и считаем записи
        const onlineRef = ref(rtdb, "online");
        onValue(onlineRef, (snapshot) => {
            const count = snapshot.exists() ? Object.keys(snapshot.val()).length : 0;
            document.getElementById("onlineCount").textContent =
                `${count} ${getUserWord(count)} онлайн`;
        });

        // Склонение слова "пользователь"
        function getUserWord(n) {
            const mod10 = n % 10, mod100 = n % 100;
            if (mod100 >= 11 && mod100 <= 14) return "пользователей";
            if (mod10 === 1)  return "пользователь";
            if (mod10 >= 2 && mod10 <= 4) return "пользователя";
            return "пользователей";
        }

    
        let allDocs = [];

        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            allDocs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            renderSearch(document.getElementById("searchInput").value);
        });

        document.getElementById("searchInput").addEventListener("input", (e) => {
            renderSearch(e.target.value);
        });

        function renderSearch(term) {
            const container = document.getElementById("searchResults");
            const lowerTerm = term.trim().toLowerCase();

            const filtered = lowerTerm
                ? allDocs.filter(d => d.name?.toLowerCase().includes(lowerTerm))
                : allDocs;

            if (filtered.length === 0) {
                container.innerHTML = `<p class="no-results">${lowerTerm ? "Ничего не найдено 🔍" : "Начните вводить имя..."}</p>`;
                return;
            }

            container.innerHTML = filtered.map(data => {
                const highlighted = lowerTerm
                    ? data.name.replace(new RegExp(`(${lowerTerm})`, "gi"), "<mark>$1</mark>")
                    : data.name;

                const time = data.timestamp?.toDate().toLocaleTimeString() || "...";
                return `
                    <div class="post">
                        <span class="time">${time}</span>
                        <b>${highlighted}</b>
                        <p style="margin: 5px 0;">${data.email}</p>
                        <button class="like-btn" onclick="processLike('${data.id}')">👍 ${data.likes || 0}</button>
                    </div>
                `;
            }).join("");
        }

        window.processLike = async (id) => {
            const docRef = doc(db, "requests", id);
            try { await updateDoc(docRef, { likes: increment(1) }); }
            catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
